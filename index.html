<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FAST Journey – ソノボくんと学ぶ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --blue-deep:#0a1628;--blue-mid:#1a3a6e;--blue-vivid:#1565d8;
  --blue-bright:#3d8ef0;--blue-light:#7bb8f8;
  --white:#fff;--gold:#f5c842;--green:#22c55e;--red:#ef4444;--purple:#a855f7;
  --radius:20px;--radius-sm:12px;--radius-lg:28px;
  --nav-h:72px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;min-height:100vh;font-family:'Noto Sans JP',sans-serif;
  background:var(--blue-deep);color:var(--white);overflow-x:hidden;}

/* ===== はみ出し防止（必須） ===== */
p,h1,h2,h3,span,li,.text-elem{
  word-break:break-all;overflow-wrap:break-word;min-width:0;
}

/* ===== 背景 ===== */
.bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden;
  background:linear-gradient(160deg,#040d1f 0%,#0a1e4a 40%,#091535 100%);}
.bg-canvas::before{content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%,rgba(21,101,216,.25) 0%,transparent 70%),
    radial-gradient(ellipse 60% 40% at 90% 80%,rgba(61,142,240,.15) 0%,transparent 60%);}
.star{position:absolute;border-radius:50%;background:white;opacity:0;
  animation:twinkle var(--dur,3s) var(--delay,0s) infinite ease-in-out;}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:var(--op,.7);transform:scale(1)}}
.wave-ring{position:absolute;border-radius:50%;border:1px solid rgba(61,142,240,.15);
  animation:expandRing 6s infinite ease-out;}
@keyframes expandRing{0%{transform:scale(.6);opacity:.5}100%{transform:scale(3.2);opacity:0}}

/* ===== ラッパー ===== */
.app-wrapper{position:relative;z-index:1;max-width:430px;margin:0 auto;
  min-height:100vh;display:flex;flex-direction:column;
  min-width:0;overflow:hidden;}

/* ===== アニメーション ===== */
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.3)}to{opacity:1;transform:scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes glowPulse{0%,100%{opacity:.5;transform:translateX(-50%) scaleX(1)}50%{opacity:.9;transform:translateX(-50%) scaleX(1.2)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes shimmerBg{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes scanLine{0%{top:-4px}100%{top:100%}}
@keyframes orbitSpin{0%{transform:rotate(0deg) translateX(70px) rotate(0deg)}100%{transform:rotate(360deg) translateX(70px) rotate(-360deg)}}

/* ===== SPLASH ===== */
#splash{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:48px 20px calc(var(--nav-h) + 20px);min-height:100vh;animation:fadeIn .6s ease;}

.splash-logo-row{display:flex;align-items:center;gap:10px;margin-bottom:18px;
  opacity:0;animation:slideDown .8s .3s ease forwards;
  min-width:0;overflow:hidden;}
.splash-logo{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:4px;
  color:var(--blue-light);text-transform:uppercase;}
.logo-dot{width:6px;height:6px;border-radius:50%;background:var(--blue-bright);
  box-shadow:0 0 8px var(--blue-bright);}

.splash-title-wrap{text-align:center;margin-bottom:4px;
  opacity:0;animation:slideDown .8s .5s ease forwards;}
.splash-title{font-family:'Orbitron',sans-serif;font-size:48px;font-weight:900;
  line-height:1;letter-spacing:4px;
  background:linear-gradient(135deg,#fff 0%,#7bb8f8 40%,#3d8ef0 80%,#1565d8 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 20px rgba(61,142,240,.4));}
.splash-sub-title{font-family:'Zen Kaku Gothic New',sans-serif;font-size:15px;font-weight:700;
  color:rgba(255,255,255,.7);letter-spacing:2px;margin-top:6px;}

.splash-sub{font-size:11px;color:var(--blue-light);letter-spacing:1px;margin-bottom:28px;margin-top:3px;
  opacity:0;animation:slideDown .8s .65s ease forwards;}

/* ソノボくん */
.sonobo-scene{position:relative;width:220px;height:220px;margin:0 auto 20px;
  opacity:0;animation:popIn .9s .9s cubic-bezier(.34,1.56,.64,1) forwards;}
.orbit-ring{position:absolute;inset:10px;border-radius:50%;
  border:1px dashed rgba(61,142,240,.28);animation:float 4s ease-in-out infinite;}
.orbit-dot{position:absolute;width:9px;height:9px;border-radius:50%;
  background:var(--blue-bright);box-shadow:0 0 12px var(--blue-bright);
  top:50%;left:50%;margin:-4.5px;
  animation:orbitSpin 4s linear infinite;}
/* 外周リング追加 */
.orbit-ring-outer{position:absolute;inset:-4px;border-radius:50%;
  border:1px solid rgba(61,142,240,.1);animation:orbitSpin 12s linear infinite reverse;}
.sonobo-img-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.sonobo-img{width:172px;height:172px;object-fit:contain;
  filter:drop-shadow(0 10px 32px rgba(21,101,216,.75)) drop-shadow(0 0 16px rgba(61,142,240,.3));
  animation:float 3.2s ease-in-out infinite;}
.sonobo-glow{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);
  width:130px;height:22px;
  background:radial-gradient(ellipse,rgba(21,101,216,.65) 0%,transparent 70%);
  border-radius:50%;animation:glowPulse 3.2s ease-in-out infinite;}
/* スキャンライン演出 */
.sonobo-scan{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:50%;}
.sonobo-scan::after{content:'';position:absolute;left:0;right:0;height:4px;
  background:linear-gradient(transparent,rgba(61,142,240,.35),transparent);
  animation:scanLine 2.5s ease-in-out infinite;}

/* スピーチバブル */
.speech-bubble{background:rgba(255,255,255,.07);backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.14);border-radius:var(--radius);
  padding:16px 18px;margin:0 4px 24px;position:relative;
  opacity:0;animation:fadeIn .8s 1.5s ease forwards;
  box-shadow:0 4px 30px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.1);
  min-width:0;overflow:hidden;}
.speech-bubble::before{content:'';position:absolute;top:-9px;left:50%;transform:translateX(-50%);
  border:9px solid transparent;border-bottom-color:rgba(255,255,255,.1);border-top:none;}
.bubble-header{display:flex;align-items:center;gap:6px;margin-bottom:6px;
  min-width:0;overflow:hidden;}
.bubble-status{width:7px;height:7px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px var(--green);flex-shrink:0;
  animation:blink 2s ease-in-out infinite;}
.bubble-name{font-size:11px;font-weight:700;color:var(--blue-light);letter-spacing:1px;}
.bubble-text{font-size:14px;line-height:1.75;color:rgba(255,255,255,.88);
  min-height:52px;word-break:break-all;overflow-wrap:break-word;min-width:0;}
.cursor-blink{display:inline-block;width:2px;height:14px;background:var(--blue-bright);
  margin-left:2px;animation:blink .8s infinite;vertical-align:middle;}

/* ステータスバー */
.status-strip{display:flex;align-items:center;justify-content:center;gap:20px;
  margin:0 4px 22px;padding:12px 16px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:var(--radius-sm);
  opacity:0;animation:fadeIn .8s 2.0s ease forwards;
  min-width:0;overflow:hidden;}
.status-item{display:flex;flex-direction:column;align-items:center;gap:3px;
  min-width:0;overflow:hidden;}
.status-val{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--gold);}
.status-lbl{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:1px;text-transform:uppercase;
  word-break:break-all;overflow-wrap:break-word;}
.status-divider{width:1px;height:28px;background:rgba(255,255,255,.1);flex-shrink:0;}

/* スタートボタン */
.btn-start{display:flex;align-items:center;justify-content:center;gap:12px;
  width:calc(100% - 8px);padding:19px 24px;
  background:linear-gradient(135deg,var(--blue-vivid) 0%,#0d4fc0 100%);
  border:none;border-radius:var(--radius);cursor:pointer;
  font-family:'Zen Kaku Gothic New',sans-serif;font-size:17px;font-weight:900;color:white;
  box-shadow:0 6px 32px rgba(21,101,216,.55),inset 0 1px 0 rgba(255,255,255,.2);
  transition:transform .2s ease,box-shadow .2s ease;
  opacity:0;animation:fadeIn .8s 2.4s ease forwards;
  margin:0 4px;position:relative;overflow:hidden;
  min-width:0;}
.btn-start::before{content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.1) 50%,transparent 60%);
  background-size:200% 100%;animation:shimmerBg 2.5s infinite linear;}
.btn-start:active{transform:scale(.97);box-shadow:0 3px 16px rgba(21,101,216,.4);}
.btn-label{position:relative;z-index:1;word-break:break-all;overflow-wrap:break-word;}
.btn-arrow{font-size:20px;position:relative;z-index:1;flex-shrink:0;}

.version-tag{font-size:10px;color:rgba(255,255,255,.2);letter-spacing:1px;text-align:center;
  margin-top:14px;opacity:0;animation:fadeIn .8s 2.8s ease forwards;}
</style>
</head>
<body>
<div class="bg-canvas" id="bgCanvas"></div>
<div class="app-wrapper">

<!-- ========== SPLASH ========== -->
<div id="splash">
  <div class="splash-logo-row">
    <div class="logo-dot"></div>
    <p class="splash-logo">SONOFORGE PRESENTS</p>
    <div class="logo-dot"></div>
  </div>

  <div class="splash-title-wrap">
    <h1 class="splash-title">伊澤が作った</h1>
    <p class="splash-sub-title">革新的システム</p>
  </div>
  <p class="splash-sub">ソノボくんと学ぶ・超音波入門</p>

  <!-- ソノボくん -->
  <div class="sonobo-scene">
    <div class="orbit-ring-outer"></div>
    <div class="orbit-ring">
      <div class="orbit-dot"></div>
    </div>
    <div class="sonobo-img-wrap">
      <img class="sonobo-img" src="assets/sonobo_1.png" alt="ソノボくん">
    </div>
    <div class="sonobo-scan"></div>
    <div class="sonobo-glow"></div>
  </div>

  <!-- タイピングバブル -->
  <div class="speech-bubble">
    <div class="bubble-header">
      <div class="bubble-status"></div>
      <p class="bubble-name">ソノボくん</p>
    </div>
    <p class="bubble-text" id="typingText"></p>
  </div>

  <!-- ステータスストリップ -->
  <div class="status-strip">
    <div class="status-item">
      <span class="status-val">5</span>
      <span class="status-lbl">Missions</span>
    </div>
    <div class="status-divider"></div>
    <div class="status-item">
      <span class="status-val">⭐</span>
      <span class="status-lbl">Award</span>
    </div>
    <div class="status-divider"></div>
    <div class="status-item">
      <span class="status-val" id="visitorCount" style="color:#a78bfa;">…</span>
      <span class="status-lbl">Visitors</span>
    </div>
  </div>

  <!-- スタートボタン -->
  <button class="btn-start" onclick="warpTo('home.html')">
    <span class="btn-label">はじめる</span>
    <span class="btn-arrow">🚀</span>
  </button>

  <p class="version-tag">v1.0 — FAST Journey by SONOFORGE</p>
</div>

</div><!-- /app-wrapper -->

<script>
// ===== 背景 =====
function initBg() {
  const bg = document.getElementById('bgCanvas');
  for (let i = 0; i < 70; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.5 + 0.5;
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${Math.random()*3+2}s;--delay:${Math.random()*4}s;--op:${Math.random()*.6+.2};`;
    bg.appendChild(s);
  }
  // wave rings
  for (let i = 0; i < 4; i++) {
    const r = document.createElement('div');
    r.className = 'wave-ring';
    const sz = 40 + i * 40;
    r.style.cssText = `width:${sz}px;height:${sz}px;left:${20+Math.random()*60}%;top:${20+Math.random()*60}%;animation-delay:${i*1.4}s;`;
    bg.appendChild(r);
  }
}
initBg();

// ===== 音響 =====
let audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
const SOUNDS = {
  correct: () => {
    const ctx = getCtx();
    [523,659,784,1047].forEach((freq,i) => {
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;o.type='sine';
      const t=ctx.currentTime+i*.1;
      g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.001,t+.4);
      o.start(t);o.stop(t+.4);
    });
  },
  wrong: () => {
    const ctx = getCtx();
    [220,196].forEach((freq,i) => {
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;o.type='sawtooth';
      const t=ctx.currentTime+i*.15;
      g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);
      o.start(t);o.stop(t+.3);
    });
  },
  warp: () => {
    const ctx = getCtx();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.type='sawtooth';
    o.frequency.setValueAtTime(100,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(2000,ctx.currentTime+.6);
    g.gain.setValueAtTime(.3,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.8);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+.8);
  },
  tap: () => {
    const ctx = getCtx();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.frequency.value=800;o.type='sine';
    g.gain.setValueAtTime(.1,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.08);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+.08);
  },
  reward: () => {
    const ctx = getCtx();
    [523,659,784,1047,1319].forEach((freq,i) => {
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;o.type='triangle';
      const t=ctx.currentTime+i*.12;
      g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.001,t+.5);
      o.start(t);o.stop(t+.5);
    });
  }
};
function playSound(name) { try { SOUNDS[name] && SOUNDS[name](); } catch(e){} }

// ===== ワープ演出 =====
function warpTo(url) {
  playSound('warp');
  const overlay = document.createElement('div');
  overlay.style.cssText = `
    position:fixed;inset:0;z-index:9999;background:black;opacity:0;
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;
  `;
  for (let i = 0; i < 30; i++) {
    const streak = document.createElement('div');
    const angle = Math.random() * 360;
    const len = Math.random() * 200 + 50;
    streak.style.cssText = `
      position:absolute;left:50%;top:50%;
      width:${len}px;height:2px;
      background:linear-gradient(90deg,white,transparent);
      transform-origin:left center;
      transform:rotate(${angle}deg) scaleX(0);
      animation:streakOut .4s .1s ease forwards;
    `;
    overlay.appendChild(streak);
  }
  const txt = document.createElement('p');
  txt.textContent = 'WARP DRIVE ENGAGED';
  txt.style.cssText = `font-family:'Orbitron',sans-serif;font-size:13px;color:white;letter-spacing:4px;opacity:0;animation:fadeInOut .8s .2s ease forwards;z-index:1;word-break:break-all;overflow-wrap:break-word;min-width:0;`;
  overlay.appendChild(txt);
  document.body.appendChild(overlay);
  const style = document.createElement('style');
  style.textContent = `
    @keyframes streakOut{0%{transform:rotate(var(--a,0deg)) scaleX(0) translateX(0)}50%{transform:rotate(var(--a,0deg)) scaleX(1) translateX(0);opacity:1}100%{transform:rotate(var(--a,0deg)) scaleX(0) translateX(300px);opacity:0}}
    @keyframes fadeInOut{0%,100%{opacity:0}30%,70%{opacity:1}}
  `;
  document.head.appendChild(style);
  overlay.animate([{opacity:0},{opacity:1}],{duration:200,fill:'forwards'})
    .finished.then(() => {
      setTimeout(() => {
        overlay.animate([{opacity:1},{opacity:0}],{duration:300,fill:'forwards'})
          .finished.then(() => { location.href = url; });
      }, 700);
    });
}

// ===== 訪問者カウント（Googleスプレッドシート連携） =====
(function(){
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbwRlYKhtLYeE9NGSu8VUNsF_wWfb5eArtPV9dR9VTaSEyMdukihb47lZcquhhablTtPYw/exec';
  const ua = navigator.userAgent;
  const isIpad = /iPad|Macintosh/.test(ua) && navigator.maxTouchPoints > 1;
  const device = isIpad ? 'iPad' : /iPhone/.test(ua) ? 'iPhone' : 'その他';
  const el = document.getElementById('visitorCount');
  fetch(GAS_URL + '?device=' + encodeURIComponent(device))
    .then(r => r.json())
    .then(data => {
      if (el) el.textContent = data.total.toLocaleString() + '人';
    })
    .catch(() => {
      if (el) el.textContent = '--';
    });
})();

// ===== タイピングアニメ =====
const msgs = [
  'キャプテン！ぼくはソノボくん🤖\nFASTの銀河へようこそ！',
  '一緒にFASTをマスターしよう！\n初学者でも大丈夫、ぼくが全部ナビするよ🚀',
  '全5ミッションをクリアすれば\n"Galactic Rescue Cadet"の称号が手に入るぞ！',
  '準備はいい？\nさあ、旅を始めよう！'
];
let mi = 0, ci = 0;
const tel = document.getElementById('typingText');
function typeText() {
  const msg = msgs[mi];
  tel.innerHTML = msg.slice(0, ci).replace(/\n/g, '<br>') + '<span class="cursor-blink"></span>';
  ci++;
  if (ci <= msg.length) {
    setTimeout(typeText, 42);
  } else {
    setTimeout(() => { mi = (mi + 1) % msgs.length; ci = 0; setTimeout(typeText, 300); }, 2400);
  }
}
setTimeout(typeText, 1800);
</script>
</body>
</html>
